name: Trigger AWX Job

on:
  push:
    branches: [main]
    paths:
      - 'playbooks/**'
      - 'roles/**'
      - 'inventory/**'
  workflow_dispatch:

jobs:
  trigger-awx:
    runs-on: self-hosted
    steps:
      - name: Trigger AWX Job Template
        env:
          AWX_URL: ${{ secrets.AWX_URL }}
          AWX_TOKEN: ${{ secrets.AWX_TOKEN }}
          AWX_JOB_TEMPLATE_ID: ${{ secrets.AWX_JOB_TEMPLATE_ID }}
        run: |
          echo "Launching AWX job template ${AWX_JOB_TEMPLATE_ID}..."
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${AWX_TOKEN}" \
            -H "Content-Type: application/json" \
            "${AWX_URL}/api/v2/job_templates/${AWX_JOB_TEMPLATE_ID}/launch/")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ne 201 ]; then
            echo "Failed to launch job (HTTP ${HTTP_CODE})"
            echo "$BODY"
            exit 1
          fi

          JOB_ID=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "Job launched successfully: ID ${JOB_ID}"
          echo "JOB_ID=${JOB_ID}" >> $GITHUB_ENV

      - name: Wait for AWX Job completion
        env:
          AWX_URL: ${{ secrets.AWX_URL }}
          AWX_TOKEN: ${{ secrets.AWX_TOKEN }}
        run: |
          echo "Waiting for job ${JOB_ID} to complete..."
          for i in $(seq 1 60); do
            STATUS=$(curl -s \
              -H "Authorization: Bearer ${AWX_TOKEN}" \
              "${AWX_URL}/api/v2/jobs/${JOB_ID}/" | \
              python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")

            echo "  Status: ${STATUS}"

            case $STATUS in
              successful)
                echo "Job completed successfully!"
                exit 0
                ;;
              failed|error|canceled)
                echo "Job finished with status: ${STATUS}"
                # Fetch output for debugging
                curl -s \
                  -H "Authorization: Bearer ${AWX_TOKEN}" \
                  "${AWX_URL}/api/v2/jobs/${JOB_ID}/stdout/?format=txt"
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "Timed out waiting for job"
          exit 1
